<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saliya · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Flutter-buildable admin: Container/BoxDecoration, Row/Column/Wrap, ListView, DataTable-style rows,
     bar chart = sized Containers (fl_chart), Switch, DropdownButton, Dialog(modal), LinearGradient, BoxShadow.
     No backdrop-filter, no background-clip:text, no organic blob radius, no keyframe morphing. */
  :root{
    /* THEME — Saliya (violet + orange) */
    --pri:#6d3b52; --pri-d:#4a2439; --acc:#c8a04b; --acc-d:#a9822f;
    --side:#4a2439; --side-txt:#e6d4da; --side-act:#c8a04b;
    --bg:#fbf6f4; --card:#fff; --ink:#2a2129; --muted:#8b7b83; --line:#efe3e6;
    --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --font-head:'Playfair Display',serif; --font-body:'Poppins',sans-serif;
    --shadow:0 6px 18px rgba(109,59,82,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink);line-height:1.45}
  h1,h2,h3,h4,.brand-name{font-family:var(--font-head)}
  a{text-decoration:none;color:inherit}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .hidden{display:none!important}

  .admin{display:flex;min-height:100vh}
  /* ---------- SIDEBAR ---------- */
  .sidebar{width:240px;background:var(--side);color:var(--side-txt);flex:0 0 auto;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;padding:20px 14px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
  .brand .b-emoji{font-size:26px}
  .brand-name{font-size:21px;font-weight:800;color:#fff}
  .brand .pill{background:var(--acc);color:#fff;font-family:var(--font-body);font-weight:800;font-size:9px;
    letter-spacing:1px;padding:3px 7px;border-radius:5px}
  .side-nav{display:flex;flex-direction:column;gap:4px;margin-top:6px}
  .side-nav button{display:flex;align-items:center;gap:12px;background:none;border:none;color:var(--side-txt);
    font-weight:700;font-size:14.5px;padding:12px 14px;border-radius:10px;text-align:left;transition:.15s}
  .side-nav button .ic{font-size:18px}
  .side-nav button:hover{background:rgba(255,255,255,.08)}
  .side-nav button.active{background:rgba(255,255,255,.14);color:#fff;box-shadow:inset 3px 0 0 var(--side-act)}
  .view-store{margin-top:auto;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);
    color:#fff;font-weight:700;font-size:13.5px;padding:12px 14px;border-radius:10px}
  .view-store:hover{background:rgba(255,255,255,.16)}

  /* ---------- CONTENT ---------- */
  .content{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(251,246,244,.92);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:16px 24px}
  .mobile-brand{display:none;align-items:center;gap:8px;font-family:var(--font-head);font-weight:800;font-size:18px}
  .topbar h1{font-size:24px;font-weight:700}
  .admin-chip{margin-left:auto;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
    padding:6px 12px 6px 6px;border-radius:999px;box-shadow:var(--shadow)}
  .admin-chip .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--acc));
    color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px}
  .admin-chip b{font-size:13px}.admin-chip small{color:var(--muted);font-size:11px;font-weight:700;display:block;line-height:1}
  .mtabs{display:none;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:none}
  .mtabs::-webkit-scrollbar{display:none}
  .mtabs button{flex:0 0 auto;background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:800;
    font-size:13px;padding:8px 16px;border-radius:999px}
  .mtabs button.active{background:var(--pri);color:#fff;border-color:var(--pri)}
  .view{display:none;padding:22px 24px 40px}
  .view.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- KPI CARDS ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .kpi .k-top{display:flex;align-items:center;justify-content:space-between}
  .kpi .k-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px}
  .kpi .k-trend{font-size:12px;font-weight:800;padding:3px 8px;border-radius:999px}
  .kpi .k-trend.up{background:#dcfce7;color:var(--green)} .kpi .k-trend.down{background:#fee2e2;color:var(--red)}
  .kpi b{font-family:var(--font-head);font-size:30px;display:block;margin-top:12px}
  .kpi small{color:var(--muted);font-weight:700}

  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .panel-h h3{font-size:18px}
  .panel-h a,.panel-h .link{color:var(--pri);font-weight:800;font-size:13px;background:none;border:none}
  .grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:16px}

  /* chart */
  .chart{display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:10px}
  .chart .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .chart .bar{width:100%;max-width:40px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--pri),var(--acc));position:relative}
  .chart .bar span{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:var(--muted)}
  .chart .day{font-size:11px;font-weight:800;color:var(--muted)}

  /* mini list rows */
  .mini{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .mini:last-child{border:none}
  .mini .m-img{width:42px;height:42px;border-radius:10px;overflow:hidden;background:var(--bg);flex:0 0 auto}
  .mini .m-img img{width:100%;height:100%;object-fit:cover}
  .mini .m-main{flex:1;min-width:0}
  .mini .m-name{font-weight:800;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .m-sub{color:var(--muted);font-weight:700;font-size:12px}
  .mini .m-right{font-weight:800;font-size:13.5px;text-align:right}
  .stock-red{color:var(--red)}

  /* ---------- TOOLBAR ---------- */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;min-width:220px;flex:1;max-width:340px}
  .search input{border:none;outline:none;background:none;font-size:14px;width:100%;font-weight:600}
  .fpills{display:flex;gap:6px;flex-wrap:wrap}
  .fpill{background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:800;font-size:12.5px;
    padding:8px 14px;border-radius:999px}
  .fpill.active{background:var(--pri);color:#fff;border-color:var(--pri)}
  .btn{background:var(--pri);color:#fff;border:none;font-weight:800;font-size:13.5px;padding:10px 18px;border-radius:10px;
    display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--pri-d)}
  .btn.acc{background:var(--acc)} .btn.acc:hover{background:var(--acc-d)}
  .btn.ghost{background:#fff;color:var(--pri);border:1.5px solid var(--line)}
  .btn.block{width:100%;justify-content:center;padding:14px}

  /* ---------- PRODUCT / ORDER ROWS ---------- */
  .prow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .prow .p-img{width:56px;height:56px;border-radius:10px;overflow:hidden;background:var(--bg);flex:0 0 auto}
  .prow .p-img img{width:100%;height:100%;object-fit:cover}
  .prow .p-main{flex:1;min-width:150px}
  .prow .p-name{font-weight:800;font-size:14.5px}
  .prow .p-attr{color:var(--muted);font-weight:700;font-size:12px;margin-top:2px}
  .prow .p-price{font-family:var(--font-head);font-size:16px;margin-top:2px}
  .prow .p-price s{font-family:var(--font-body);color:var(--muted);font-weight:600;font-size:12px;margin-left:5px}
  .badge{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;white-space:nowrap}
  .badge.in{background:#dcfce7;color:var(--green)} .badge.low{background:#fef3c7;color:var(--amber)} .badge.out{background:#fee2e2;color:var(--red)}
  .switch{width:44px;height:24px;border-radius:999px;background:#e0d3d9;border:none;position:relative;transition:.2s;flex:0 0 auto}
  .switch.on{background:var(--green)}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .switch.on::after{left:22px}
  .icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:15px;display:grid;place-items:center}
  .icon-btn:hover{background:var(--bg)}
  .p-acts{display:flex;gap:8px;align-items:center}

  /* order row */
  .orow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:10px}
  .orow .o-id{font-weight:800;font-size:14px}
  .orow .o-cust{color:var(--muted);font-weight:700;font-size:12.5px;margin-top:2px}
  .orow .o-mid{flex:1;min-width:150px}
  .orow .o-items{color:var(--muted);font-weight:700;font-size:12.5px}
  .orow .o-total{font-family:var(--font-head);font-size:16px}
  .st{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap;display:inline-block}
  .st.pending{background:#fef3c7;color:#b45309}
  .st.confirmed{background:#e0e7ff;color:#4338ca}
  .st.packed{background:#ede9fe;color:#6d28d9}
  .st.shipped{background:#dbeafe;color:#1d4ed8}
  .st.out-for-delivery{background:#cffafe;color:#0e7490}
  .st.delivered{background:#dcfce7;color:#15803d}
  .st.cancelled{background:#fee2e2;color:#b91c1c}

  /* ---------- ORDER DETAIL ---------- */
  .od-back{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--pri);font-weight:800;font-size:14px;margin-bottom:14px}
  .od-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start}
  .od-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
  .od-head h2{font-size:24px}
  .od-head .od-meta{color:var(--muted);font-weight:700;font-size:13px;margin-top:2px}
  .od-status-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .od-status-row select{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-weight:700;font-size:13px;background:#fff}
  .od-item{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .od-item:last-child{border:none}
  .od-item .oi-img{width:56px;height:56px;border-radius:10px;overflow:hidden;background:var(--bg);flex:0 0 auto}
  .od-item .oi-img img{width:100%;height:100%;object-fit:cover}
  .od-item .oi-main{flex:1}
  .od-item .oi-name{font-weight:800;font-size:14px}
  .od-item .oi-attr{color:var(--muted);font-weight:700;font-size:12px}
  .od-item .oi-price{font-weight:800;text-align:right;white-space:nowrap}
  .od-item .oi-price small{display:block;color:var(--muted);font-weight:700;font-size:11px}
  .sum-line{display:flex;justify-content:space-between;padding:6px 0;font-weight:700;color:#4a4358;font-size:14px}
  .sum-line.tot{border-top:1px dashed var(--line);margin-top:6px;padding-top:12px;font-family:var(--font-head);font-size:19px;color:var(--ink)}
  .sum-line .free{color:var(--green);font-weight:800}
  .info-line{display:flex;gap:10px;padding:8px 0;font-size:13.5px}
  .info-line .il-ic{width:22px;text-align:center}
  .info-line b{font-weight:800}.info-line span{color:var(--muted);font-weight:600}
  .card-title{font-family:var(--font-head);font-size:16px;margin-bottom:8px}
  .tl{display:flex;flex-direction:column;margin-top:6px}
  .tl .step{display:flex;gap:12px;position:relative}
  .tl .dot{width:22px;height:22px;border-radius:50%;background:#e5d7dc;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;z-index:2;flex:0 0 auto}
  .tl .step.done .dot{background:var(--green)}
  .tl .step:not(:last-child)::before{content:"";position:absolute;left:10px;top:22px;height:100%;width:2px;background:#e5d7dc}
  .tl .step.done:not(:last-child)::before{background:var(--green)}
  .tl .s-info{padding:1px 0 16px}
  .tl .s-info b{font-size:13.5px;color:var(--muted)}
  .tl .step.done .s-info b{color:var(--ink)}
  .tl .s-info small{display:block;color:var(--muted);font-weight:700;font-size:12px}
  .cancel-banner{background:#fee2e2;color:#b91c1c;font-weight:800;padding:12px 14px;border-radius:10px;font-size:13.5px}
  .stk-col{display:flex;flex-direction:column;gap:16px}

  /* ---------- INVENTORY ---------- */
  .inv-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .inv-chip{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 18px;box-shadow:var(--shadow)}
  .inv-chip b{font-family:var(--font-head);font-size:22px;display:block}
  .inv-chip small{color:var(--muted);font-weight:800;font-size:12px}
  .inv-chip.in b{color:var(--green)} .inv-chip.low b{color:var(--amber)} .inv-chip.out b{color:var(--red)}
  .stepper-mini{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .stepper-mini button{width:34px;height:34px;border:none;background:var(--bg);font-weight:800;font-size:16px;color:var(--ink)}
  .stepper-mini b{min-width:44px;text-align:center;font-size:15px}
  .stock-num{font-family:var(--font-head);font-size:20px;min-width:40px;text-align:center}

  /* ---------- MODAL ---------- */
  .modal{position:fixed;inset:0;z-index:80;background:rgba(42,33,41,.45);display:none;place-items:center;padding:18px}
  .modal.open{display:grid}
  .modal-card{background:#fff;border-radius:18px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.3)}
  .modal-head{position:sticky;top:0;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-size:20px}
  .modal-x{border:none;background:var(--bg);width:34px;height:34px;border-radius:9px;font-size:16px}
  .modal-body{padding:20px}
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:800;font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;font-weight:600;background:#fff;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pri)}
  .field textarea{resize:vertical;min-height:64px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .img-picker{display:flex;gap:14px;align-items:flex-start}
  .img-preview{width:88px;height:88px;border-radius:12px;overflow:hidden;background:var(--bg);flex:0 0 auto;border:1px solid var(--line)}
  .img-preview img{width:100%;height:100%;object-fit:cover}
  .modal-foot{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 20px;display:flex;gap:10px;justify-content:flex-end}
  .hint{color:var(--muted);font-weight:700;font-size:11.5px;margin-top:4px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:#fff;
    font-weight:800;padding:13px 22px;border-radius:12px;z-index:90;box-shadow:0 12px 30px rgba(0,0,0,.25);transition:.35s;font-size:14px}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* ---------- RESPONSIVE ---------- */
  @media(max-width:900px){
    .sidebar{display:none}
    .mobile-brand{display:flex}
    .topbar h1{display:none}
    .mtabs{display:flex}
    .kpis{grid-template-columns:1fr 1fr}
    .grid-2{grid-template-columns:1fr}
    .od-grid{grid-template-columns:1fr}
    .frow{grid-template-columns:1fr}
  }
  @media(max-width:520px){ .prow .p-price,.orow .o-total{width:100%} }
</style>
</head>
<body>
<div class="admin">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand"><span class="b-emoji" id="sideEmoji">💄</span><span class="brand-name" id="sideName">Saliya</span><span class="pill">ADMIN</span></div>
    <nav class="side-nav" id="sideNav">
      <button data-sec="dashboard" class="active"><span class="ic">📊</span> Dashboard</button>
      <button data-sec="products"><span class="ic">📦</span> Products</button>
      <button data-sec="orders"><span class="ic">🧾</span> Orders</button>
      <button data-sec="inventory"><span class="ic">📥</span> Inventory</button>
    </nav>
    <a class="view-store" href="../index.html">🛍️ View Store</a>
  </aside>

  <!-- CONTENT -->
  <div class="content">
    <div class="topbar">
      <div class="mobile-brand"><span id="mEmoji">💄</span> <span id="mName">Saliya</span></div>
      <h1 id="pageTitle">Dashboard</h1>
      <div class="admin-chip"><span class="av">AD</span><div><b>Admin</b><small>Store Manager</small></div></div>
    </div>
    <div class="mtabs" id="mtabs">
      <button data-sec="dashboard" class="active">📊 Dashboard</button>
      <button data-sec="products">📦 Products</button>
      <button data-sec="orders">🧾 Orders</button>
      <button data-sec="inventory">📥 Inventory</button>
    </div>

    <section id="view-dashboard" class="view active"></section>
    <section id="view-products" class="view"></section>
    <section id="view-orders" class="view"></section>
    <section id="view-inventory" class="view"></section>
    <section id="view-order-detail" class="view"></section>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="prodModal">
  <div class="modal-card">
    <div class="modal-head"><h3 id="modalTitle">Add Product</h3><button class="modal-x" onclick="closeProd()">✕</button></div>
    <div class="modal-body">
      <div class="field">
        <label>Product Image</label>
        <div class="img-picker">
          <div class="img-preview"><img id="f_preview" alt=""></div>
          <div style="flex:1">
            <input id="f_img" placeholder="Paste image URL (optional)" oninput="updatePreview()">
            <div class="hint">or type a keyword below to auto-fetch a photo</div>
            <input id="f_q" placeholder="Image keyword e.g. baby,dress" style="margin-top:8px" oninput="updatePreview()">
          </div>
        </div>
      </div>
      <div class="field"><label>Product Name</label><input id="f_name" placeholder="e.g. Rainbow Ruffle Frock"></div>
      <div class="frow">
        <div class="field"><label>Category</label><select id="f_cat"></select></div>
        <div class="field"><label>Brand</label><input id="f_brand" placeholder="e.g. TinyTwirl"></div>
      </div>
      <div class="frow">
        <div class="field"><label>Selling Price (₹)</label><input id="f_price" type="number" placeholder="749"></div>
        <div class="field"><label>MRP (₹)</label><input id="f_mrp" type="number" placeholder="1199"></div>
      </div>
      <div class="frow">
        <div class="field"><label>Stock Qty</label><input id="f_stock" type="number" placeholder="42"></div>
        <div class="field"><label>Color</label><input id="f_color" placeholder="e.g. Pink"></div>
      </div>
      <div class="frow">
        <div class="field"><label>Material</label><input id="f_material" placeholder="e.g. Cotton"></div>
        <div class="field"><label>Sizes (comma separated)</label><input id="f_sizes" placeholder="0-3M, 3-6M, 1-2Y"></div>
      </div>
      <div class="field"><label>Tags (comma separated)</label><input id="f_tags" placeholder="Bestseller, New"></div>
      <div class="field"><label>Description</label><textarea id="f_desc" placeholder="Short product description…"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeProd()">Cancel</button>
      <button class="btn" onclick="saveProduct()">Save Product</button>
    </div>

/* ---------- products ---------- */
let pSearch='', pCat='All';
function renderProducts(){

}
function paintProducts(){
  const q=pSearch.toLowerCase().trim();
  const list=PRODUCTS.filter(p=>(pCat==='All'||p.cat===pCat)&&(q===''||p.name.toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q)));

}
function toggleActive(id){const p=P(id);p.active=!p.active;paintProducts();showToast(p.active?'Product activated':'Product hidden');}

/* ---------- product modal ---------- */
let editingId=null;
function fillCatSelect(){$('f_cat').innerHTML=CATEGORIES.map(c=>`<option>${c}</option>`).join('');}
function updatePreview(){const url=$('f_img').value.trim();const q=$('f_q').value.trim()||'product';$('f_preview').src=url||`https://loremflickr.com/200/200/${q}?lock=777`;$('f_preview').onerror=function(){this.onerror=null;this.src='https://picsum.photos/seed/prev/200/200'};}
function openProd(id){
  editingId=id||null; fillCatSelect();
  const p=id?P(id):null;
  $('modalTitle').textContent=id?'Edit Product':'Add Product';
  $('f_img').value=p&&p.img?p.img:''; $('f_q').value=p?p.q||'':'';
  $('f_name').value=p?p.name:''; $('f_cat').value=p?p.cat:CATEGORIES[0];
  $('f_brand').value=p?p.brand||'':''; $('f_price').value=p?p.price:''; $('f_mrp').value=p?p.mrp:'';
  $('f_stock').value=p?p.stock:''; $('f_color').value=p?p.color||'':''; $('f_material').value=p?p.material||'':'';
  $('f_sizes').value=p&&p.sizes?p.sizes.join(', '):''; $('f_tags').value=p&&p.tags?p.tags.join(', '):''; $('f_desc').value=p?p.desc||'':'';
  updatePreview(); $('prodModal').classList.add('open');
}
function closeProd(){$('prodModal').classList.remove('open');}
function saveProduct(){
  const name=$('f_name').value.trim(); const price=+$('f_price').value; const mrp=+$('f_mrp').value||price;
  if(!name){showToast('Please enter a product name');return;}
  if(!price){showToast('Please enter a price');return;}
  const data={
    name, cat:$('f_cat').value, price, mrp, stock:+$('f_stock').value||0,
    brand:$('f_brand').value.trim(), color:$('f_color').value.trim(), material:$('f_material').value.trim(),
    sizes:$('f_sizes').value.split(',').map(s=>s.trim()).filter(Boolean),
    tags:$('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    desc:$('f_desc').value.trim(),
    img:$('f_img').value.trim()||null, q:$('f_q').value.trim()||name.toLowerCase().split(' ').slice(0,2).join(',')
  };
  if(editingId){Object.assign(P(editingId),data);showToast('Product updated ✓');}
  else{const id=Math.max(0,...PRODUCTS.map(p=>p.id))+1;PRODUCTS.push({id,active:true,lock:500+id,...data});showToast('Product added ✓');}
  closeProd(); renderProducts();
}

            <div class="oi-main"><div class="oi-name">${p.name}</div><div class="oi-attr">${p.brand||''}${i.size?' · Size: '+i.size:(p.color?' · '+p.color:'')} · Qty: ${i.qty}</div></div>

      <button class="btn ghost" onclick="adjStock(${p.id},25)">Restock +25</button>

}
function adjStock(id,d){const p=P(id);p.stock=Math.max(0,p.stock+d);renderInventory();}
